<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050016" />
      <stop offset="50%" stop-color="#030014" />
      <stop offset="100%" stop-color="#020012" />
    </linearGradient>

    <!-- Accent gradients -->
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <linearGradient id="botLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Glow for decorative blobs -->
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="0.5" />
    </pattern>

    <!-- Tag pill filter for subtle glow -->
    <filter id="tagGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feFlood flood-color="#8b5cf6" flood-opacity="0.15" />
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bgGrad)" />

  <!-- Grid overlay -->
  <rect width="1200" height="627" fill="url(#grid)" />

  <!-- Decorative blurred blobs -->
  <ellipse cx="1050" cy="100" rx="280" ry="250" fill="url(#glowPurple)" />
  <ellipse cx="100" cy="550" rx="250" ry="220" fill="url(#glowTeal)" />
  <ellipse cx="600" cy="340" rx="400" ry="350" fill="url(#glowCenter)" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3.5" fill="url(#topLine)" />

  <!-- Bottom accent line -->
  <rect x="0" y="623.5" width="1200" height="3.5" fill="url(#botLine)" />

  <!-- "REDA ALALACH" label -->
  <text x="80" y="78" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="13"
    letter-spacing="4" fill="#a78bfa">REDA ALALACH</text>

  <!-- Separator line -->
  <line x1="80" y1="96" x2="1120" y2="96" stroke="rgba(255,255,255,0.07)" stroke-width="1" />

  <!-- Title -->
  <text x="80" y="172" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="58"
    fill="#ffffff">My Portfolio</text>

  <!-- Accent underline under title -->
  <rect x="80" y="186" width="120" height="3" rx="1.5" fill="#8b5cf6" opacity="0.6" />

  <!-- Description lines -->
  <text x="80" y="240" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22"
    fill="rgba(255,255,255,0.6)">Performance-focused personal portfolio built with React 19,</text>
  <text x="80" y="272" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22"
    fill="rgba(255,255,255,0.6)">TypeScript, Tailwind CSS v4, and Vite 7.</text>

  <!-- Feature highlights with dots -->
  <circle cx="92" cy="322" r="3.5" fill="#8b5cf6" />
  <text x="106" y="327" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="17"
    fill="rgba(255,255,255,0.50)">Lighthouse 95+ / 100 / 100 / 100</text>

  <circle cx="92" cy="354" r="3.5" fill="#2dd4bf" />
  <text x="106" y="359" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="17"
    fill="rgba(255,255,255,0.50)">Blog · Case Studies · i18n (EN/FR) · MDX</text>

  <circle cx="92" cy="386" r="3.5" fill="#8b5cf6" />
  <text x="106" y="391" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="17"
    fill="rgba(255,255,255,0.50)">CI/CD · Playwright E2E · Accessibility (WCAG AA)</text>

  <!-- Tech tag pills -->
  <g filter="url(#tagGlow)">
    <!-- React 19 -->
    <rect x="80" y="440" width="96" height="34" rx="7" fill="rgba(139,92,246,0.12)"
      stroke="rgba(139,92,246,0.28)" stroke-width="1" />
    <text x="104" y="462" font-family="Arial, Helvetica, sans-serif" font-weight="500"
      font-size="14" fill="#c4b5fd">React 19</text>

    <!-- TypeScript -->
    <rect x="188" y="440" width="108" height="34" rx="7" fill="rgba(139,92,246,0.12)"
      stroke="rgba(139,92,246,0.28)" stroke-width="1" />
    <text x="210" y="462" font-family="Arial, Helvetica, sans-serif" font-weight="500"
      font-size="14" fill="#c4b5fd">TypeScript</text>

    <!-- Tailwind v4 -->
    <rect x="308" y="440" width="108" height="34" rx="7" fill="rgba(139,92,246,0.12)"
      stroke="rgba(139,92,246,0.28)" stroke-width="1" />
    <text x="328" y="462" font-family="Arial, Helvetica, sans-serif" font-weight="500"
      font-size="14" fill="#c4b5fd">Tailwind v4</text>

    <!-- Vite 7 -->
    <rect x="428" y="440" width="72" height="34" rx="7" fill="rgba(139,92,246,0.12)"
      stroke="rgba(139,92,246,0.28)" stroke-width="1" />
    <text x="444" y="462" font-family="Arial, Helvetica, sans-serif" font-weight="500"
      font-size="14" fill="#c4b5fd">Vite 7</text>

    <!-- Playwright -->
    <rect x="512" y="440" width="104" height="34" rx="7" fill="rgba(45,212,191,0.10)"
      stroke="rgba(45,212,191,0.25)" stroke-width="1" />
    <text x="533" y="462" font-family="Arial, Helvetica, sans-serif" font-weight="500"
      font-size="14" fill="#5eead4">Playwright</text>

    <!-- GitHub Actions -->
    <rect x="628" y="440" width="138" height="34" rx="7" fill="rgba(45,212,191,0.10)"
      stroke="rgba(45,212,191,0.25)" stroke-width="1" />
    <text x="652" y="462" font-family="Arial, Helvetica, sans-serif" font-weight="500"
      font-size="14" fill="#5eead4">GitHub Actions</text>

    <!-- SEO -->
    <rect x="778" y="440" width="56" height="34" rx="7" fill="rgba(45,212,191,0.10)"
      stroke="rgba(45,212,191,0.25)" stroke-width="1" />
    <text x="793" y="462" font-family="Arial, Helvetica, sans-serif" font-weight="500"
      font-size="14" fill="#5eead4">SEO</text>

    <!-- A11y -->
    <rect x="846" y="440" width="58" height="34" rx="7" fill="rgba(45,212,191,0.10)"
      stroke="rgba(45,212,191,0.25)" stroke-width="1" />
    <text x="861" y="462" font-family="Arial, Helvetica, sans-serif" font-weight="500"
      font-size="14" fill="#5eead4">A11y</text>
  </g>

  <!-- Decorative code bracket element (right side) -->
  <g opacity="0.06" transform="translate(920, 130)">
    <text font-family="Courier New, monospace" font-size="160" fill="#8b5cf6">{</text>
    <text x="120" font-family="Courier New, monospace" font-size="160" fill="#2dd4bf">}</text>
  </g>

  <!-- Bottom separator -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- Domain -->
  <text x="1120" y="578" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="15"
    fill="rgba(255,255,255,0.30)" text-anchor="end">remyportfolio.me</text>

  <!-- Live badge -->
  <g transform="translate(80, 556)">
    <rect width="68" height="26" rx="13" fill="rgba(45,212,191,0.12)" stroke="rgba(45,212,191,0.3)"
      stroke-width="1" />
    <circle cx="18" cy="13" r="4" fill="#2dd4bf" opacity="0.8" />
    <text x="30" y="17.5" font-family="Arial, Helvetica, sans-serif" font-weight="600"
      font-size="11" fill="#2dd4bf">LIVE</text>
  </g>

  <!-- GitHub link hint -->
  <text x="164" y="574" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13"
    fill="rgba(255,255,255,0.25)">github.com/redaalch/myPortfolio</text>
</svg>